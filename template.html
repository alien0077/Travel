<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互動旅遊導航與行程手冊範本</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pulse-active {
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
        }
        .scrollbar-none::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-none {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-24 min-h-screen">

    <!-- Premium Sticky Header -->
    <header class="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white shadow-xl sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-inner animate-pulse">
                    <i class="fa-solid fa-map-location-dot text-xl"></i>
                </div>
                <div>
                    <h1 id="header-title" class="font-black text-base tracking-wider">TRIP NAVI 2026</h1>
                    <p id="header-subtitle" class="text-[10px] text-indigo-200">旅遊手冊範本</p>
                </div>
            </div>
            <!-- VJW / Custom Link Badge -->
            <button onclick="scrollToTools()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold py-1.5 px-3 rounded-full flex items-center gap-1.5 transition-all shadow-md active:scale-95">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
                </span>
                <span id="header-action-text">VJW / 實用工具</span>
            </button>
        </div>
    </header>

    <!-- Top Countdown & Flight Widget -->
    <div class="max-w-md mx-auto px-4 pt-4">
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">
                    <i class="fa-solid fa-plane mr-1.5"></i>航班與倒數
                </span>
                <span id="countdown" class="text-xs font-semibold text-slate-500">計算中...</span>
            </div>
            <div class="grid grid-cols-2 gap-4 divide-x divide-slate-100">
                <div>
                    <p id="flight-outbound-title" class="text-[9px] text-slate-400 font-bold uppercase">去程航班</p>
                    <p id="flight-outbound-detail" class="text-xs font-bold text-slate-700 mt-0.5">尚未設定</p>
                </div>
                <div class="pl-4">
                    <p id="flight-inbound-title" class="text-[9px] text-slate-400 font-bold uppercase">回程航班</p>
                    <p id="flight-inbound-detail" class="text-xs font-bold text-slate-700 mt-0.5">尚未設定</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN INTERACTIVE CONTAINER -->
    <main class="max-w-md mx-auto px-4">

        <!-- Navigation Tabs -->
        <div id="navigation-tabs" class="flex gap-1 overflow-x-auto pb-3 mb-4 scrollbar-none sticky top-[68px] bg-slate-50 py-1.5 z-30">
            <!-- Tabs injected by JS -->
        </div>

        <!-- Tab Contents Container -->
        <div id="tab-contents" class="space-y-4">
            <!-- Day contents injected by JS -->
        </div>

        <!-- ================= TAB: TOOLS & LEDGER ================= -->
        <div id="tab-tools" class="tab-content hidden space-y-4">
            
            <!-- Checklist Section -->
            <div id="checklist-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 mb-3 text-slate-800">
                    <i class="fa-solid fa-clipboard-list text-indigo-500"></i>
                    <h3 class="font-bold text-sm">重要景點解鎖進度</h3>
                </div>
                <div id="checklist" class="space-y-2.5 divide-y divide-slate-50">
                    <!-- Sights injected by JS -->
                </div>
            </div>

            <!-- Expense Ledger Section (Only if enabled) -->
            <div id="ledger-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2 text-slate-800">
                        <i class="fa-solid fa-calculator text-indigo-500"></i>
                        <h3 class="font-bold text-sm">即時共享記帳本</h3>
                    </div>
                    <div class="text-[10px] text-slate-400 font-bold">匯率估算：1 JPY ≈ <span id="rate-display">0.22</span> TWD</div>
                </div>

                <!-- Input area -->
                <div class="grid grid-cols-5 gap-1.5 mb-4">
                    <input type="text" id="expense-name" placeholder="項目（如：藥妝）" class="col-span-3 text-xs bg-slate-50 border border-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
                    <input type="number" id="expense-amount" placeholder="日幣" class="col-span-2 text-xs bg-slate-50 border border-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
                    <button onclick="addExpense()" class="col-span-5 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white text-xs font-bold py-2.5 rounded-xl transition-all shadow-md">
                        新增記帳
                    </button>
                </div>

                <!-- Expense list -->
                <div id="expense-list" class="divide-y divide-slate-100 max-h-[220px] overflow-y-auto scrollbar-none pr-1">
                    <!-- Items injected by JS -->
                </div>

                <!-- Total summary -->
                <div class="border-t border-slate-100 mt-3 pt-3 flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-500">累計花費</span>
                    <div class="text-right">
                        <p id="total-jpy" class="text-base font-black text-slate-800">0 JPY</p>
                        <p id="total-twd" class="text-[10px] font-bold text-slate-400 mt-0.5">NT$ 0</p>
                    </div>
                </div>
            </div>

            <!-- VJW Link Card -->
            <div id="vjw-section" class="bg-gradient-to-br from-slate-900 to-indigo-950 text-white rounded-2xl p-5 shadow-lg border border-slate-800 transition-all duration-300">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-passport text-emerald-400 text-lg"></i>
                        <h3 class="font-extrabold text-sm tracking-wider">Visit Japan Web 資訊</h3>
                    </div>
                    <span class="bg-emerald-500 text-[9px] font-black uppercase px-2 py-0.5 rounded-full text-slate-950">快速填寫對照</span>
                </div>
                <p class="text-[10px] text-indigo-200/80 leading-relaxed mb-4">
                    入國審查與海關申報需要填寫的住宿資訊，可直接點擊複製：
                </p>
                <div class="space-y-2">
                    <div class="bg-slate-800/60 rounded-xl p-3 border border-slate-700/50 flex justify-between items-center hover:bg-slate-800 transition-all">
                        <div>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">飯店郵遞區號</p>
                            <p id="vjw-zip" class="text-xs font-bold font-mono mt-0.5">尚未設定</p>
                        </div>
                        <button onclick="copyToClipboard(document.getElementById('vjw-zip').innerText, '飯店郵遞區號')" class="bg-slate-700 hover:bg-indigo-600 text-white text-[10px] font-bold py-1 px-2.5 rounded-lg active:scale-95 transition-all">
                            複製
                        </button>
                    </div>
                    <div class="bg-slate-800/60 rounded-xl p-3 border border-slate-700/50 flex justify-between items-center hover:bg-slate-800 transition-all">
                        <div>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">住宿地址 (日文/英文)</p>
                            <p id="vjw-addr" class="text-xs font-bold mt-0.5">尚未設定</p>
                        </div>
                        <button onclick="copyToClipboard(document.getElementById('vjw-addr').innerText, '住宿地址')" class="bg-slate-700 hover:bg-indigo-600 text-white text-[10px] font-bold py-1 px-2.5 rounded-lg active:scale-95 transition-all">
                            複製
                        </button>
                    </div>
                    <div class="bg-slate-800/60 rounded-xl p-3 border border-slate-700/50 flex justify-between items-center hover:bg-slate-800 transition-all">
                        <div>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">飯店名稱</p>
                            <p id="vjw-name" class="text-xs font-bold mt-0.5">尚未設定</p>
                        </div>
                        <button onclick="copyToClipboard(document.getElementById('vjw-name').innerText, '飯店名稱')" class="bg-slate-700 hover:bg-indigo-600 text-white text-[10px] font-bold py-1 px-2.5 rounded-lg active:scale-95 transition-all">
                            複製
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= PERSISTENT NOTE AREA ================= -->
        <div class="mt-4 bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-bold text-slate-700"><i class="fa-solid fa-pen-nib mr-1.5 text-indigo-500"></i>隨手小筆記</span>
                <span class="text-[9px] text-slate-400 font-medium">每頁獨立儲存</span>
            </div>
            <textarea id="quick-note" oninput="saveQuickNote()" rows="3" placeholder="輸入此頁的特殊隨手小筆記..." class="w-full text-xs bg-slate-50 border border-slate-100 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"></textarea>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-max max-w-[280px]"></div>

    <!-- ========================================== -->
    <!-- TRAVEL CONFIGURATION DATA & ENGINE -->
    <!-- ========================================== -->
    <script>
        // ==========================================
        // 1. 旅客行程配置物件 (請在此替換為新的行程資訊)
        // ==========================================
        const tripConfig = {
            appId: 'travel-template-2026', // LocalStorage 儲存命名空間
            tripType: 'city',              // 模式：'city' (市區/記帳/打卡) 或 'drive' (自駕/MAPCODE/隱藏記帳)
            jpyToTwdRate: 0.22,             // 日幣兌台幣匯率
            countdownDate: '2026/07/05 08:05:00', // 倒數計時目標時間
            
            title: 'TRAVEL NAVI 2026',
            subtitle: '日式親子旅行互動手冊',
            actionText: 'VJW / 工具',
            
            flights: {
                outbound: '去程：FD234 | 高雄 08:05 ➔ 12:55 成田',
                inbound: '回程：FD235 | 成田 13:55 ➔ 17:05 高雄'
            },
            
            vjw: {
                zip: '110-0015',
                address: '東京都台東区東上野 X-XX-X',
                name: 'Ostay Ueno Hotel'
            },
            
            sightsList: [
                { id: 'sight1', name: '🎮 Day 1: 台場一丁目商店街', day: 'day1' },
                { id: 'sight2', name: '🏢 Day 2: 寶可夢中心旗艦店', day: 'day2' },
                { id: 'sight3', name: '🛍️ Day 3: 上野阿美橫町大採購', day: 'day3' }
            ],
            
            defaultExpenses: [
                { id: 1, name: '🏩 預留住宿費用', amount: 98000 }
            ],
            
            days: {
                day1: {
                    label: 'Day 1',
                    date: '7/5 (日)',
                    title: '抵達東京與台場夜景',
                    timeRange: '12:55pm - 09:30pm',
                    timeline: [
                        {
                            type: 'transport', // 'transport' (大眾交通) 或 'act' (活動/景點)
                            time: '12:55pm - 14:30pm',
                            title: '成田機場 ➔ 上野京成電鐵 (大眾交通)',
                            detail: '搭乘 Skyliner 42 號直達日暮里/上野。請先在櫃檯購票或兌換實體票。',
                            mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8'
                        },
                        {
                            type: 'act',
                            time: '15:00pm - 15:30pm',
                            title: '飯店辦理 Check-in (景點活動)',
                            detail: '入住 Ostay Ueno Hotel 放置行李。',
                            mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8',
                            mapcode: '12 345 678*90' // 自駕模式選填
                        }
                    ],
                    food: [
                        {
                            meal: '晚餐 (18:00)',
                            name: '名代宇奈とと 鰻魚飯',
                            detail: '上野平價高 CP 值鰻魚飯，大推雙倍鰻魚丼。',
                            mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8',
                            mapcode: '12 345 678*90' // 自駕模式選填
                        }
                    ],
                    parking: [ // 自駕模式選填
                        {
                            name: '上野中央地下停車場',
                            detail: '寬敞好停，有大眾合作收費優惠。',
                            mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8',
                            mapcode: '12 345 678*90'
                        }
                    ],
                    hotel: {
                        name: 'Ostay Ueno Hotel',
                        detail: '靠近上野站，出入非常方便。',
                        mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8',
                        mapcode: '12 345 678*90' // 自駕模式選填
                    },
                    details: '首日抵達請先在京成電鐵櫃檯加值 Suica 卡，並確認孩子身上的防丟吊牌與手錶狀態。'
                },
                day2: {
                    label: 'Day 2',
                    date: '7/6 (一)',
                    title: '寶可夢與動漫朝聖日',
                    timeRange: '09:00am - 08:00pm',
                    timeline: [
                        {
                            type: 'act',
                            time: '10:00am - 13:00pm',
                            title: '池袋太陽城 & 寶可夢中心',
                            detail: '朝聖日本最大寶可夢旗艦店，長輩可在太陽城咖啡廳休息。',
                            mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8'
                        }
                    ],
                    food: [
                        {
                            meal: '午餐 (13:00)',
                            name: '無敵家拉麵',
                            detail: '池袋超人氣厚切叉燒拉麵，需現場排隊。',
                            mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8'
                        }
                    ],
                    hotel: {
                        name: 'Ostay Ueno Hotel',
                        detail: '續住同地點。',
                        mapUrl: 'https://maps.app.goo.gl/uX7r5cWf41V5U23b8'
                    },
                    details: '池袋人潮極多，請牽好小孩防走失。'
                }
            }
        };

        // ==========================================
        // 2. 互動核心引擎 (不需修改)
        // ==========================================
        let state = {
            activeTab: 'day1',
            expenses: [],
            completedSights: {},
            quickNotes: {}
        };

        window.onload = function() {
            initStaticInfo();
            loadState();
            renderTabs();
            renderDaysHtml();
            switchTab(state.activeTab);
            startCountdown();
            renderChecklist();
            renderExpenses();
            updateNotePlaceholder();
        };

        function initStaticInfo() {
            // 初始化標題與資訊
            document.title = tripConfig.title + ' - ' + tripConfig.subtitle;
            document.getElementById('header-title').innerText = tripConfig.title;
            document.getElementById('header-subtitle').innerText = tripConfig.subtitle;
            document.getElementById('header-action-text').innerText = tripConfig.actionText;
            
            document.getElementById('flight-outbound-detail').innerText = tripConfig.flights.outbound;
            document.getElementById('flight-inbound-detail').innerText = tripConfig.flights.inbound;
            
            document.getElementById('vjw-zip').innerText = tripConfig.vjw.zip;
            document.getElementById('vjw-addr').innerText = tripConfig.vjw.address;
            document.getElementById('vjw-name').innerText = tripConfig.vjw.name;
            
            document.getElementById('rate-display').innerText = tripConfig.jpyToTwdRate;

            // 自駕模式特定 UI 調整
            if (tripConfig.tripType === 'drive') {
                document.getElementById('ledger-section').classList.add('hidden');
            }
        }

        function loadState() {
            const saved = localStorage.getItem(tripConfig.appId);
            if (saved) {
                try {
                    state = JSON.parse(saved);
                    // 驗證 activeTab 是否合法，否則設回預設
                    const validTabs = [...Object.keys(tripConfig.days), 'tools'];
                    if (!validTabs.includes(state.activeTab)) {
                        state.activeTab = Object.keys(tripConfig.days)[0];
                    }
                } catch(e) {
                    initDefaultState();
                }
            } else {
                initDefaultState();
            }
        }

        function initDefaultState() {
            const defaultNotes = {};
            Object.keys(tripConfig.days).forEach(dayKey => {
                defaultNotes[dayKey] = '';
            });
            defaultNotes['tools'] = '';

            state = {
                activeTab: Object.keys(tripConfig.days)[0],
                expenses: [...tripConfig.defaultExpenses],
                completedSights: {},
                quickNotes: defaultNotes
            };
            saveState();
        }

        function saveState() {
            localStorage.setItem(tripConfig.appId, JSON.stringify(state));
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('navigation-tabs');
            tabsContainer.innerHTML = '';

            Object.entries(tripConfig.days).forEach(([key, dayData]) => {
                const btn = document.createElement('button');
                btn.id = `btn-${key}`;
                btn.onclick = () => switchTab(key);
                btn.className = 'tab-btn px-3.5 py-3 rounded-xl font-bold text-xs flex-1 text-center whitespace-nowrap tab-transition bg-white text-slate-600 shadow-sm border border-slate-100';
                btn.innerHTML = `
                    <div class="text-[9px] opacity-75">${dayData.date}</div>
                    ${dayData.label}
                `;
                tabsContainer.appendChild(btn);
            });

            // 實用工具 tab
            const toolsBtn = document.createElement('button');
            toolsBtn.id = 'btn-tools';
            toolsBtn.onclick = () => switchTab('tools');
            toolsBtn.className = 'tab-btn px-3.5 py-3 rounded-xl font-bold text-xs flex-1 text-center whitespace-nowrap tab-transition bg-white text-slate-600 shadow-sm border border-slate-100';
            toolsBtn.innerHTML = `
                <div class="text-[9px] text-emerald-600"><i class="fa-solid fa-copy"></i></div>
                ${tripConfig.actionText}
            `;
            tabsContainer.appendChild(toolsBtn);
        }

        function renderDaysHtml() {
            const container = document.getElementById('tab-contents');
            container.innerHTML = '';

            Object.entries(tripConfig.days).forEach(([dayKey, dayData]) => {
                const dayDiv = document.createElement('div');
                dayDiv.id = `tab-${dayKey}`;
                dayDiv.className = 'tab-content space-y-4';

                // Banner
                let dayBannerHtml = `
                    <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-4 text-white shadow-md">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-[10px] font-bold bg-white/20 px-2 py-0.5 rounded-full uppercase tracking-wider">${dayData.date}</span>
                                <h2 class="text-base font-black mt-1">${dayData.title}</h2>
                            </div>
                            <span class="text-2xl font-black opacity-80">${dayData.label}</span>
                        </div>
                        <div class="mt-3 pt-3 border-t border-white/20 flex justify-between items-center text-[10px] font-bold text-indigo-100">
                            <span>🕒 核心時段：${dayData.timeRange}</span>
                        </div>
                    </div>
                `;
                dayDiv.innerHTML += dayBannerHtml;

                // Timeline Card
                let timelineHtml = `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                        <h3 class="font-bold text-slate-800 text-xs mb-4 flex items-center gap-1.5">
                            <i class="fa-solid fa-route text-indigo-500"></i> 當日時間軸與導航
                        </h3>
                        <div class="relative border-l border-slate-100 pl-4 ml-2 space-y-5">
                `;

                dayData.timeline.forEach(item => {
                    const isTransport = item.type === 'transport';
                    const icon = isTransport ? 'fa-train-subway text-blue-500' : 'fa-location-dot text-indigo-500';
                    const badgeClass = isTransport ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-indigo-50 text-indigo-600 border-indigo-100';
                    const badgeText = isTransport ? '大眾交通' : '景點活動';

                    let mapButton = '';
                    if (item.mapUrl) {
                        mapButton = `
                            <a href="${item.mapUrl}" target="_blank" class="mt-2 inline-flex items-center gap-1 text-[10px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-2.5 py-1.5 rounded-lg transition-all">
                                <i class="fa-solid fa-map-location-dot"></i> 地圖導航
                            </a>
                        `;
                    }

                    let mapcodeBadge = '';
                    if (item.mapcode && tripConfig.tripType === 'drive') {
                        mapcodeBadge = `
                            <button onclick="copyToClipboard('${item.mapcode}', 'Mapcode')" class="mt-2 inline-flex items-center gap-1 text-[10px] font-bold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-2.5 py-1.5 rounded-lg transition-all ml-1.5">
                                <i class="fa-solid fa-keyboard"></i> Mapcode: ${item.mapcode}
                            </button>
                        `;
                    }

                    timelineHtml += `
                        <div class="relative">
                            <div class="absolute -left-[24px] top-0 bg-white border border-slate-100 w-4 h-4 rounded-full flex items-center justify-center shadow-sm">
                                <i class="fa-solid ${icon} text-[8px]"></i>
                            </div>
                            <div class="flex items-center gap-1.5 flex-wrap">
                                <span class="text-xs font-black text-slate-800">${item.time}</span>
                                <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-md border ${badgeClass}">${badgeText}</span>
                            </div>
                            <h4 class="text-xs font-bold text-slate-700 mt-1">${item.title}</h4>
                            <p class="text-[10px] text-slate-500 mt-0.5 leading-relaxed">${item.detail}</p>
                            <div class="flex flex-wrap">${mapButton}${mapcodeBadge}</div>
                        </div>
                    `;
                });

                timelineHtml += `
                        </div>
                    </div>
                `;
                dayDiv.innerHTML += timelineHtml;

                // Food Card
                let foodHtml = `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                        <h3 class="font-bold text-slate-800 text-xs mb-3 flex items-center gap-1.5">
                            <i class="fa-solid fa-utensils text-orange-500"></i> 美食補給站
                        </h3>
                        <div class="space-y-3">
                `;
                dayData.food.forEach(f => {
                    let mapButton = f.mapUrl ? `
                        <a href="${f.mapUrl}" target="_blank" class="text-indigo-600 hover:text-indigo-800"><i class="fa-solid fa-map-location-dot"></i></a>
                    ` : '';

                    let mapcodeBadge = (f.mapcode && tripConfig.tripType === 'drive') ? `
                        <button onclick="copyToClipboard('${f.mapcode}', 'Mapcode')" class="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-1.5 py-0.5 rounded text-[8px] font-mono font-bold">
                            MC: ${f.mapcode}
                        </button>
                    ` : '';

                    foodHtml += `
                        <div class="bg-orange-50/40 rounded-xl p-3 border border-orange-100/30 flex justify-between items-start gap-3">
                            <div class="space-y-1">
                                <div class="flex items-center gap-1.5">
                                    <span class="bg-orange-100 text-orange-700 text-[8px] font-bold px-1.5 py-0.5 rounded-md">${f.meal}</span>
                                    <span class="text-xs font-bold text-slate-800">${f.name}</span>
                                </div>
                                <p class="text-[10px] text-slate-500 leading-relaxed">${f.detail}</p>
                                ${mapcodeBadge}
                            </div>
                            ${mapButton}
                        </div>
                    `;
                });
                foodHtml += `
                        </div>
                    </div>
                `;
                dayDiv.innerHTML += foodHtml;

                // Parking Card (Only in drive mode and if parking exists)
                if (tripConfig.tripType === 'drive' && dayData.parking && dayData.parking.length > 0) {
                    let parkingHtml = `
                        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                            <h3 class="font-bold text-slate-800 text-xs mb-3 flex items-center gap-1.5">
                                <i class="fa-solid fa-square-parking text-blue-500"></i> 建議停車場資訊
                            </h3>
                            <div class="space-y-3">
                    `;
                    dayData.parking.forEach(p => {
                        let mapButton = p.mapUrl ? `
                            <a href="${p.mapUrl}" target="_blank" class="text-indigo-600 hover:text-indigo-800"><i class="fa-solid fa-map-location-dot"></i></a>
                        ` : '';

                        let mapcodeBadge = p.mapcode ? `
                            <button onclick="copyToClipboard('${p.mapcode}', 'Mapcode')" class="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-1.5 py-0.5 rounded text-[8px] font-mono font-bold">
                                MC: ${p.mapcode}
                            </button>
                        ` : '';

                        parkingHtml += `
                            <div class="bg-blue-50/40 rounded-xl p-3 border border-blue-100/30 flex justify-between items-start gap-3">
                                <div class="space-y-1">
                                    <div class="flex items-center gap-1.5">
                                        <span class="bg-blue-100 text-blue-700 text-[8px] font-bold px-1.5 py-0.5 rounded-md">停車場</span>
                                        <span class="text-xs font-bold text-slate-800">${p.name}</span>
                                    </div>
                                    <p class="text-[10px] text-slate-500 leading-relaxed">${p.detail}</p>
                                    ${mapcodeBadge}
                                </div>
                                ${mapButton}
                            </div>
                        `;
                    });
                    parkingHtml += `
                            </div>
                        </div>
                    `;
                    dayDiv.innerHTML += parkingHtml;
                }

                // Hotel Card
                if (dayData.hotel) {
                    let hotelMapButton = dayData.hotel.mapUrl ? `
                        <a href="${dayData.hotel.mapUrl}" target="_blank" class="text-indigo-600 hover:text-indigo-800"><i class="fa-solid fa-map-location-dot"></i></a>
                    ` : '';

                    let hotelMapcode = (dayData.hotel.mapcode && tripConfig.tripType === 'drive') ? `
                        <button onclick="copyToClipboard('${dayData.hotel.mapcode}', 'Mapcode')" class="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-1.5 py-0.5 rounded text-[8px] font-mono font-bold">
                            MC: ${dayData.hotel.mapcode}
                        </button>
                    ` : '';

                    let hotelHtml = `
                        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                            <h3 class="font-bold text-slate-800 text-xs mb-3 flex items-center gap-1.5">
                                <i class="fa-solid fa-hotel text-purple-500"></i> 今日指定飯店
                            </h3>
                            <div class="bg-purple-50/40 rounded-xl p-3 border border-purple-100/30 flex justify-between items-start gap-3">
                                <div class="space-y-1">
                                    <h4 class="text-xs font-bold text-slate-800">${dayData.hotel.name}</h4>
                                    <p class="text-[10px] text-slate-500 leading-relaxed">${dayData.hotel.detail || ''}</p>
                                    ${hotelMapcode}
                                </div>
                                ${hotelMapButton}
                            </div>
                        </div>
                    `;
                    dayDiv.innerHTML += hotelHtml;
                }

                // Alert details
                if (dayData.details) {
                    let alertHtml = `
                        <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 flex gap-3 text-slate-700">
                            <i class="fa-solid fa-circle-exclamation text-amber-500 text-sm shrink-0 mt-0.5"></i>
                            <div>
                                <h4 class="text-xs font-bold text-slate-800">重要路況與叮嚀</h4>
                                <p class="text-[10px] text-slate-500 mt-1 leading-relaxed">${dayData.details}</p>
                            </div>
                        </div>
                    `;
                    dayDiv.innerHTML += alertHtml;
                }

                container.appendChild(dayDiv);
            });
        }

        function switchTab(tabId) {
            state.activeTab = tabId;
            saveState();

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn px-3.5 py-3 rounded-xl font-bold text-xs flex-1 text-center whitespace-nowrap tab-transition bg-white text-slate-600 shadow-sm border border-slate-100';
            });

            const targetContent = document.getElementById(`tab-${tabId}`);
            if (targetContent) {
                targetContent.classList.remove('hidden');
            }

            const activeBtn = document.getElementById(`btn-${tabId}`);
            if (activeBtn) {
                activeBtn.className = 'tab-btn px-3.5 py-3 rounded-xl font-bold text-xs flex-1 text-center whitespace-nowrap tab-transition bg-indigo-600 text-white shadow-md font-extrabold pulse-active';
            }

            updateNotePlaceholder();
        }

        function scrollToTools() {
            switchTab('tools');
            setTimeout(() => {
                const element = document.getElementById('vjw-section');
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    element.classList.add('ring-4', 'ring-emerald-400');
                    setTimeout(() => {
                        element.classList.remove('ring-4', 'ring-emerald-400');
                    }, 1500);
                }
            }, 100);
        }

        function copyToClipboard(text, fieldName) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast(`✅ ${fieldName}已成功複製到剪貼簿！`, 'success');
                } else {
                    showToast('❌ 複製失敗，請手動複製', 'error');
                }
            } catch (err) {
                showToast('❌ 複製失敗，請手動複製', 'error');
            }

            document.body.removeChild(textarea);
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const bgClass = type === 'success' ? 'bg-slate-900 border-emerald-500 text-slate-100' : 'bg-red-900 border-red-500 text-red-100';

            toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl border shadow-lg text-xs font-semibold ${bgClass} transition-all transform translate-y-2 opacity-0 duration-300`;
            toast.innerHTML = `
                <i class="${type === 'success' ? 'fa-solid fa-circle-check text-emerald-400' : 'fa-solid fa-triangle-exclamation text-red-400'}"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 2500);
        }

        function startCountdown() {
            const targetDate = new Date(tripConfig.countdownDate).getTime();

            function update() {
                const now = new Date().getTime();
                const diff = targetDate - now;

                if (diff <= 0) {
                    document.getElementById('countdown').innerHTML = "🎉 祝您旅途愉快！";
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

                document.getElementById('countdown').innerHTML = `<i class="fa-solid fa-hourglass-half text-amber-500 mr-1 animate-spin-slow"></i> 剩 ${days} 天 ${hours} 小時`;
            }

            update();
            setInterval(update, 60000);
        }

        function renderChecklist() {
            const el = document.getElementById('checklist');
            el.innerHTML = '';

            if (!tripConfig.sightsList || tripConfig.sightsList.length === 0) {
                document.getElementById('checklist-section').classList.add('hidden');
                return;
            }

            tripConfig.sightsList.forEach(sight => {
                const isChecked = state.completedSights[sight.id] ? 'checked' : '';
                const lineThrough = isChecked ? 'line-through text-slate-400' : 'text-slate-700';

                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex items-center justify-between p-1.5 hover:bg-slate-50 rounded-lg transition-all';
                itemDiv.innerHTML = `
                    <label class="flex items-center gap-2 cursor-pointer w-full">
                        <input type="checkbox" onchange="toggleSight('${sight.id}')" ${isChecked} class="rounded text-indigo-600 focus:ring-indigo-500 h-4 w-4">
                        <span class="text-xs font-medium ${lineThrough}">${sight.name}</span>
                    </label>
                    <button onclick="switchTab('${sight.day}')" class="text-[10px] text-indigo-500 hover:underline shrink-0 font-bold ml-2">看行程</button>
                `;
                el.appendChild(itemDiv);
            });
        }

        function toggleSight(id) {
            state.completedSights[id] = !state.completedSights[id];
            saveState();
            renderChecklist();
            showToast('✅ 已同步更新景點打卡狀態！', 'success');
        }

        function renderExpenses() {
            if (tripConfig.tripType === 'drive') return;

            const listEl = document.getElementById('expense-list');
            listEl.innerHTML = '';

            let totalJpy = 0;

            state.expenses.forEach(item => {
                totalJpy += item.amount;
                const row = document.createElement('div');
                row.className = 'flex justify-between items-center py-2 text-xs';
                row.innerHTML = `
                    <div class="flex items-center gap-1.5">
                        <span class="text-slate-700">${item.name}</span>
                    </div>
                    <div class="flex items-center gap-2.5">
                        <span class="font-bold text-slate-800">${item.amount.toLocaleString()} JPY</span>
                        <button onclick="deleteExpense(${item.id})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                listEl.appendChild(row);
            });

            if (state.expenses.length === 0) {
                listEl.innerHTML = '<p class="text-slate-400 text-center py-4">目前沒有新增花費</p>';
            }

            const totalTwd = Math.round(totalJpy * tripConfig.jpyToTwdRate);
            document.getElementById('total-jpy').innerText = `${totalJpy.toLocaleString()} JPY`;
            document.getElementById('total-twd').innerText = `NT$ ${totalTwd.toLocaleString()}`;
        }

        function addExpense() {
            const nameEl = document.getElementById('expense-name');
            const amountEl = document.getElementById('expense-amount');

            const name = nameEl.value.trim();
            const amount = parseInt(amountEl.value);

            if (!name) {
                showToast('❌ 請輸入花費項目名稱', 'error');
                return;
            }
            if (isNaN(amount) || amount <= 0) {
                showToast('❌ 請輸入正確的金額', 'error');
                return;
            }

            const newItem = {
                id: Date.now(),
                name: name,
                amount: amount
            };

            state.expenses.push(newItem);
            saveState();
            renderExpenses();

            nameEl.value = '';
            amountEl.value = '';

            showToast(`💸 已成功新增 "${name}" 花費！`, 'success');
        }

        function deleteExpense(id) {
            state.expenses = state.expenses.filter(item => item.id !== id);
            saveState();
            renderExpenses();
            showToast('🗑️ 記帳項目已刪除！', 'success');
        }

        function updateNotePlaceholder() {
            const noteEl = document.getElementById('quick-note');
            const currentTab = state.activeTab;

            if (currentTab === 'tools') {
                noteEl.placeholder = '在此隨手輸入您的備忘記事（所有分頁皆能保存）...';
                noteEl.value = state.quickNotes['tools'] || '';
            } else {
                noteEl.placeholder = `輸入您在 ${tripConfig.days[currentTab]?.label || currentTab} 的特殊隨手小筆記...`;
                noteEl.value = state.quickNotes[currentTab] || '';
            }
        }

        function saveQuickNote() {
            const noteEl = document.getElementById('quick-note');
            const currentTab = state.activeTab;
            state.quickNotes[currentTab] = noteEl.value;
            saveState();
        }
    </script>
</body>
</html>
