<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行程檢視器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-active { box-shadow: 0 0 12px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-24 min-h-screen">
    <div id="app-root"></div>

    <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-max max-w-[280px]"></div>

    <script>
        const params = new URLSearchParams(location.search);
        const tripId = params.get('trip');

        if (!tripId) {
            document.getElementById('app-root').innerHTML = `
                <div class="flex items-center justify-center min-h-screen">
                    <div class="text-center p-8">
                        <div class="text-4xl mb-4">🧭</div>
                        <h1 class="font-bold text-lg mb-2">未指定行程</h1>
                        <p class="text-slate-500 text-sm mb-4">請從首頁選擇一個行程。</p>
                        <a href="index.html" class="text-indigo-600 font-bold hover:underline">回到首頁 ➔</a>
                    </div>
                </div>
            `;
        } else {
            loadTrip(tripId);
        }

        async function loadTrip(id) {
            const root = document.getElementById('app-root');
            try {
                const res = await fetch(`trips/${id}.json`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();
                renderTrip(root, data);
            } catch (e) {
                root.innerHTML = `
                    <div class="flex items-center justify-center min-h-screen">
                        <div class="text-center p-8">
                            <div class="text-4xl mb-4">😕</div>
                            <h1 class="font-bold text-lg mb-2">行程不存在</h1>
                            <p class="text-slate-500 text-sm mb-2">找不到「${id}」這個行程。</p>
                            <button onclick="location.reload()" class="text-indigo-600 font-bold hover:underline mr-4">重試</button>
                            <a href="index.html" class="text-indigo-600 font-bold hover:underline">回到首頁 ➔</a>
                        </div>
                    </div>
                `;
            }
        }

        function renderTrip(root, data) {
            const isDrive = data.type === 'drive';
            const APP_ID = `trip-${data.id}`;
            document.title = `${data.title} - ${data.subtitle || ''}`;

            let state = loadState(APP_ID, data);
            let activeTab = state.activeTab || Object.keys(data.days)[0];

            function saveState() {
                try { localStorage.setItem(APP_ID, JSON.stringify(state)); } catch(e) {}
            }

            // Build header
            root.innerHTML = `
                <header class="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white shadow-xl sticky top-0 z-40">
                    <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <a href="index.html" class="bg-indigo-600 p-2 rounded-xl hover:bg-indigo-500 transition-all">
                                <i class="fa-solid fa-arrow-left text-xl"></i>
                            </a>
                            <div>
                                <h1 class="font-black text-base tracking-wider">${data.title}</h1>
                                <p class="text-[10px] text-indigo-200">${data.subtitle || ''}</p>
                            </div>
                        </div>
                        <button onclick="scrollToTools()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold py-1.5 px-3 rounded-full flex items-center gap-1.5 transition-all shadow-md active:scale-95">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span>
                            </span>
                            ${data.actionText || 'VJW / 工具'}
                        </button>
                    </div>
                </header>

                <div class="max-w-md mx-auto px-4 pt-4">
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full">
                                <i class="fa-solid fa-plane mr-1.5"></i>航班與倒數
                            </span>
                            <span id="countdown" class="text-xs font-semibold text-slate-500">計算中...</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 divide-x divide-slate-100">
                            <div>
                                <p class="text-[9px] text-slate-400 font-bold uppercase">去程</p>
                                <p class="text-xs font-bold text-slate-700 mt-0.5">${data.flights?.outbound || '尚未設定'}</p>
                            </div>
                            <div class="pl-4">
                                <p class="text-[9px] text-slate-400 font-bold uppercase">回程</p>
                                <p class="text-xs font-bold text-slate-700 mt-0.5">${data.flights?.inbound || '尚未設定'}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="max-w-md mx-auto px-4">
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-4" id="route-map-section">
                        <div class="flex items-center gap-2 mb-2">
                            <i class="fa-solid fa-map-marked-alt text-indigo-500"></i>
                            <h3 class="font-bold text-xs text-slate-700">路線地圖</h3>
                            <span id="route-day-label" class="text-[9px] font-bold text-indigo-500 ml-auto">D1</span>
                        </div>
                        <div class="w-full max-w-[380px] mx-auto" id="map-container"></div>
                    </div>
                </div>

                <main class="max-w-md mx-auto px-4">
                    <div id="tab-bar" class="flex gap-1 overflow-x-auto pb-3 mb-4 scrollbar-none sticky top-[68px] bg-slate-50 py-1.5 z-30"></div>
                    <div id="tab-contents"></div>

                    <div id="tools-panel" class="tab-content hidden space-y-4 mt-4">
                        ${isDrive ? '' : `
                        <div id="checklist-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                            <div class="flex items-center gap-2 mb-3 text-slate-800">
                                <i class="fa-solid fa-clipboard-list text-indigo-500"></i>
                                <h3 class="font-bold text-sm">景點解鎖進度</h3>
                            </div>
                            <div id="checklist" class="space-y-2.5"></div>
                        </div>

                        <div id="ledger-section" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2 text-slate-800">
                                    <i class="fa-solid fa-calculator text-indigo-500"></i>
                                    <h3 class="font-bold text-sm">記帳本</h3>
                                </div>
                                <div class="text-[10px] text-slate-400 font-bold">1 JPY ≈ ${data.jpyToTwdRate || 0.22} TWD</div>
                            </div>
                            <div class="grid grid-cols-5 gap-1.5 mb-4">
                                <input type="text" id="expense-name" placeholder="項目" class="col-span-3 text-xs bg-slate-50 border border-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <input type="number" id="expense-amount" placeholder="日幣" class="col-span-2 text-xs bg-slate-50 border border-slate-100 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                <button onclick="window.addExpense()" class="col-span-5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2.5 rounded-xl transition-all shadow-md">新增記帳</button>
                            </div>
                            <div id="expense-list" class="divide-y divide-slate-100 max-h-[220px] overflow-y-auto"></div>
                            <div class="border-t border-slate-100 mt-3 pt-3 flex justify-between items-center">
                                <span class="text-xs font-bold text-slate-500">累計</span>
                                <div class="text-right">
                                    <p id="total-jpy" class="text-base font-black text-slate-800">0 JPY</p>
                                    <p id="total-twd" class="text-[10px] font-bold text-slate-400">NT$ 0</p>
                                </div>
                            </div>
                        </div>
                        `}

                        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                            <div class="flex items-center gap-2 mb-3 text-slate-800">
                                <i class="fa-solid fa-check-double text-emerald-500"></i>
                                <h3 class="font-bold text-sm">行前確認清單</h3>
                            </div>
                            <div id="pretrip-checklist" class="space-y-2">
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('passport')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">🛂 護照</span></label>
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('license')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">🚗 日文駕照譯本、台灣駕照、身分證</span></label>
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('money')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">💳 信用卡、日幣</span></label>
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('luggage')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">🧳 行李、牙線、綿花棒、襪子、衣服</span></label>
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('phone')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">📱 手機、充電器</span></label>
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('itinerary')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">📋 行程表</span></label>
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('vjw')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">🌐 Visit Japan Web</span></label>
                                <label class="flex items-center gap-2.5 cursor-pointer py-1"><input type="checkbox" onchange="togglePreTrip('medicine')" class="rounded text-emerald-600 h-4 w-4"><span class="text-xs font-medium text-slate-700">💊 藥（身心、血壓、眼藥）</span></label>
                            </div>
                        </div>

                        <div id="vjw-section" class="bg-gradient-to-br from-slate-900 to-indigo-950 text-white rounded-2xl p-5 shadow-lg">
                            <div class="flex items-center gap-2 mb-3">
                                <i class="fa-solid fa-passport text-emerald-400"></i>
                                <h3 class="font-extrabold text-sm">Visit Japan Web</h3>
                            </div>
                            ${data.vjw ? `
                            <div class="space-y-2">
                                ${[['郵遞區號', 'vjw-zip', data.vjw.zip], ['住宿地址', 'vjw-addr', data.vjw.address], ['飯店名稱', 'vjw-name', data.vjw.name]].map(([label, id, val]) => `
                                <div class="bg-slate-800/60 rounded-xl p-3 flex justify-between items-center">
                                    <div>
                                        <p class="text-[9px] text-slate-400 font-bold">${label}</p>
                                        <p id="${id}" class="text-xs font-bold font-mono mt-0.5">${val || '尚未設定'}</p>
                                    </div>
                                    <button onclick="copyToClipboard('${val || ''}', '${label}')" class="bg-slate-700 hover:bg-indigo-600 text-white text-[10px] font-bold py-1 px-2.5 rounded-lg transition-all">複製</button>
                                </div>
                                `).join('')}
                            </div>
                            ` : '<p class="text-xs text-slate-400">無 VJW 資料</p>'}
                        </div>
                    </div>

                    <div class="mt-4 bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-slate-700"><i class="fa-solid fa-pen-nib mr-1.5 text-indigo-500"></i>隨手筆記</span>
                            <span class="text-[9px] text-slate-400 font-medium">每頁獨立儲存</span>
                        </div>
                        <textarea id="quick-note" oninput="window.saveNote()" rows="3" class="w-full text-xs bg-slate-50 border border-slate-100 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                </main>
            `;

            // Expose functions globally for onclick handlers
            window._state = state;
            window._data = data;
            window._saveState = saveState;
            window._APP_ID = APP_ID;

            // Setup tabs
            renderTabs(data, activeTab);
            renderDayContent(data, activeTab);
            window.switchTab = (tabId) => {
                activeTab = tabId;
                state.activeTab = tabId;
                saveState();
                document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
                if (tabId === 'tools') {
                    document.getElementById('tools-panel')?.classList.remove('hidden');
                } else {
                    document.getElementById(`tab-${tabId}`)?.classList.remove('hidden');
                }
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.className = 'tab-btn px-3.5 py-3 rounded-xl font-bold text-xs flex-1 text-center whitespace-nowrap tab-transition bg-white text-slate-600 shadow-sm border border-slate-100';
                });
                document.getElementById(`btn-${tabId}`)?.classList.add('bg-indigo-600', 'text-white', 'shadow-md', 'font-extrabold', 'pulse-active');
                updateNotePlaceholder(data, state);
            };

            window.scrollToTools = () => {
                window.switchTab('tools');
                setTimeout(() => {
                    document.getElementById('vjw-section')?.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            // Checklist
            if (!isDrive && data.sightsList) {
                renderChecklist(data, state);
                window.toggleSight = (id) => {
                    state.completedSights[id] = !state.completedSights[id];
                    saveState();
                    renderChecklist(data, state);
                };
            }

            // Ledger
            if (!isDrive) {
                renderExpenses(data, state);
                window.addExpense = () => {
                    const name = document.getElementById('expense-name');
                    const amount = document.getElementById('expense-amount');
                    if (!name.value.trim() || !amount.value) return;
                    state.expenses.push({ id: Date.now(), name: name.value.trim(), amount: parseInt(amount.value) });
                    saveState();
                    renderExpenses(data, state);
                    name.value = ''; amount.value = '';
                };
                window.deleteExpense = (id) => {
                    state.expenses = state.expenses.filter(e => e.id !== id);
                    saveState();
                    renderExpenses(data, state);
                };
            }

            // Notes
            updateNotePlaceholder(data, state);
            window.saveNote = () => {
                const noteEl = document.getElementById('quick-note');
                state.quickNotes[activeTab] = noteEl.value;
                saveState();
            };

            // Pre-trip checklist
            renderPreTripChecklist(state);
            window.togglePreTrip = (id) => {
                if (!state.preTripChecked) state.preTripChecked = {};
                state.preTripChecked[id] = !state.preTripChecked[id];
                saveState();
                renderPreTripChecklist(state);
            };

            // Clipboard + Toast
            window.copyToClipboard = (text, label) => {
                navigator.clipboard?.writeText(text).then(() => showToast(`✅ ${label} 已複製`)).catch(() => showToast('❌ 複製失敗'));
            };
            function showToast(msg) {
                const c = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'bg-slate-900 text-white px-4 py-3 rounded-xl text-xs font-semibold shadow-lg border border-emerald-500 transition-all translate-y-2 opacity-0 duration-300';
                t.textContent = msg;
                c.appendChild(t);
                setTimeout(() => { t.classList.remove('translate-y-2', 'opacity-0'); }, 50);
                setTimeout(() => { t.remove(); }, 2500);
            }
            window.showToast = showToast;

            // Countdown
            if (data.countdownDate) startCountdown(data.countdownDate);

            // Inject map and draw initial route
            initMap(data).then(() => drawRoute(data, activeTab));

            // Switch to default tab
            window.switchTab(activeTab);

            // Update route on tab switch
            const origSwitch = window.switchTab;
            window.switchTab = (tabId) => {
                origSwitch(tabId);
                drawRoute(data, tabId);
            };
        }

        const DAY_COLORS = ['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16'];

        async function initMap(data) {
            const container = document.getElementById('map-container');
            try {
                const res = await fetch('japan-map.svg');
                const svgText = await res.text();
                container.innerHTML = svgText;
                const svgEl = container.querySelector('svg');
                if (svgEl) {
                    svgEl.setAttribute('viewBox', '0 0 1000 1000');
                    svgEl.style.width = '100%';
                    svgEl.style.height = 'auto';
                    // Add overlay group for routes
                    const overlay = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    overlay.id = 'route-overlay';
                    svgEl.appendChild(overlay);
                }
            } catch(e) {
                container.innerHTML = '<p class="text-xs text-slate-400">地圖載入失敗</p>';
            }
        }

        function drawRoute(data, tabId) {
            if (tabId === 'tools' || !data.days[tabId]) return;
            const day = data.days[tabId];
            const overlay = document.getElementById('route-overlay');
            if (!overlay || !day.route || day.route.length < 2) return;

            overlay.innerHTML = '';
            const dayIndex = Object.keys(data.days).indexOf(tabId);
            const color = DAY_COLORS[dayIndex % DAY_COLORS.length];

            // Draw polyline
            const points = day.route.map(p => `${p[0]},${p[1]}`).join(' ');
            const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            polyline.setAttribute('points', points);
            polyline.setAttribute('fill', 'none');
            polyline.setAttribute('stroke', color);
            polyline.setAttribute('stroke-width', '3');
            polyline.setAttribute('stroke-linejoin', 'round');
            polyline.setAttribute('stroke-linecap', 'round');
            polyline.setAttribute('opacity', '0.85');
            overlay.appendChild(polyline);

            // Draw start marker
            const start = day.route[0];
            const startCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            startCircle.setAttribute('cx', start[0]);
            startCircle.setAttribute('cy', start[1]);
            startCircle.setAttribute('r', '5');
            startCircle.setAttribute('fill', color);
            startCircle.setAttribute('stroke', '#ffffff');
            startCircle.setAttribute('stroke-width', '2');
            overlay.appendChild(startCircle);

            // Draw end marker
            const end = day.route[day.route.length - 1];
            const endCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            endCircle.setAttribute('cx', end[0]);
            endCircle.setAttribute('cy', end[1]);
            endCircle.setAttribute('r', '5');
            endCircle.setAttribute('fill', color);
            endCircle.setAttribute('stroke', '#ffffff');
            endCircle.setAttribute('stroke-width', '2');
            overlay.appendChild(endCircle);

            // Update day label
            const label = document.getElementById('route-day-label');
            if (label) {
                const dayNum = dayIndex + 1;
                label.textContent = `D${dayNum}`;
                label.style.color = color;
            }
        }

        function loadState(appId, data) {
            try {
                const saved = localStorage.getItem(appId);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    const validTabs = [...Object.keys(data.days), 'tools'];
                    if (!validTabs.includes(parsed.activeTab)) parsed.activeTab = Object.keys(data.days)[0];
                    return parsed;
                }
            } catch(e) {}
            const defaultNotes = {};
            Object.keys(data.days).forEach(k => defaultNotes[k] = '');
            defaultNotes['tools'] = '';
            return {
                activeTab: Object.keys(data.days)[0],
                expenses: data.defaultExpenses ? JSON.parse(JSON.stringify(data.defaultExpenses)) : [],
                completedSights: {},
                quickNotes: defaultNotes,
                preTripChecked: {}
            };
        }

        function renderTabs(data, activeTab) {
            const bar = document.getElementById('tab-bar');
            bar.innerHTML = '';
            Object.entries(data.days).forEach(([key, day]) => {
                const btn = document.createElement('button');
                btn.id = `btn-${key}`;
                btn.className = 'tab-btn px-3.5 py-3 rounded-xl font-bold text-xs flex-1 text-center whitespace-nowrap tab-transition bg-white text-slate-600 shadow-sm border border-slate-100';
                btn.innerHTML = `<div class="text-[9px] opacity-75">${day.date}</div>${day.label || key.toUpperCase()}`;
                btn.onclick = () => window.switchTab(key);
                bar.appendChild(btn);
            });
            const toolsBtn = document.createElement('button');
            toolsBtn.id = 'btn-tools';
            toolsBtn.className = 'tab-btn px-3.5 py-3 rounded-xl font-bold text-xs flex-1 text-center whitespace-nowrap tab-transition bg-white text-slate-600 shadow-sm border border-slate-100';
            toolsBtn.innerHTML = `<div class="text-[9px] text-emerald-600"><i class="fa-solid fa-copy"></i></div>工具`;
            toolsBtn.onclick = () => window.switchTab('tools');
            bar.appendChild(toolsBtn);
        }

        function renderDayContent(data, activeTab) {
            const container = document.getElementById('tab-contents');
            container.innerHTML = '';
            Object.entries(data.days).forEach(([key, day]) => {
                const div = document.createElement('div');
                div.id = `tab-${key}`;
                div.className = 'tab-content hidden space-y-4';
                div.innerHTML = buildDayHTML(day, key, data.type === 'drive');
                container.appendChild(div);
            });
        }

        function buildDayHTML(day, key, isDrive) {
            let html = `
                <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-4 text-white shadow-md">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-bold bg-white/20 px-2 py-0.5 rounded-full">${day.date}</span>
                            <h2 class="text-base font-black mt-1">${day.title}</h2>
                        </div>
                        <span class="text-2xl font-black opacity-80">${key.toUpperCase()}</span>
                    </div>
                    <div class="mt-3 pt-3 border-t border-white/20 flex text-[10px] font-bold text-indigo-100">
                        <span>🕒 ${day.timeRange || ''}</span>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 text-xs mb-4 flex items-center gap-1.5">
                        <i class="fa-solid fa-route text-indigo-500"></i> 時間軸
                    </h3>
                    <div class="relative border-l border-slate-100 pl-4 ml-2 space-y-5">
            `;
            (day.timeline || []).forEach(item => {
                const isTransit = item.type === 'transport' || item.type === 'drive';
                const icon = isTransit ? (item.type === 'drive' ? 'fa-car-side text-blue-500' : 'fa-train-subway text-blue-500') : 'fa-location-dot text-indigo-500';
                const badge = isTransit ? (item.type === 'drive' ? '交通自駕' : '大眾交通') : '景點活動';
                const badgeClass = isTransit ? 'bg-blue-50 text-blue-600' : 'bg-indigo-50 text-indigo-600';
                let extra = '';
                if (item.mapUrl) extra += `<a href="${item.mapUrl}" target="_blank" class="mt-2 inline-flex items-center gap-1 text-[10px] font-bold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-2.5 py-1.5 rounded-lg"><i class="fa-solid fa-map-location-dot"></i> 導航</a>`;
                if (item.mapcode && isDrive) extra += `<button onclick="copyToClipboard('${item.mapcode}', 'Mapcode')" class="mt-2 inline-flex items-center gap-1 text-[10px] font-bold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-2.5 py-1.5 rounded-lg ml-1.5"><i class="fa-solid fa-keyboard"></i> ${item.mapcode}</button>`;
                html += `
                    <div class="relative">
                        <div class="absolute -left-[24px] top-0 bg-white border border-slate-100 w-4 h-4 rounded-full flex items-center justify-center shadow-sm">
                            <i class="fa-solid ${icon} text-[8px]"></i>
                        </div>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="text-xs font-black text-slate-800">${item.time || ''}</span>
                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-md border ${badgeClass}">${badge}</span>
                        </div>
                        <h4 class="text-xs font-bold text-slate-700 mt-1">${item.title || ''}</h4>
                        <p class="text-[10px] text-slate-500 mt-0.5 leading-relaxed">${item.detail || ''}</p>
                        <div class="flex flex-wrap">${extra}</div>
                    </div>
                `;
            });
            html += '</div></div>';

            // Food
            if (day.food && day.food.length > 0) {
                html += `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 text-xs mb-3 flex items-center gap-1.5">
                        <i class="fa-solid fa-utensils text-orange-500"></i> 美食
                    </h3>
                    <div class="space-y-3">
                `;
                day.food.forEach(f => {
                    const mc = (f.mapcode && isDrive) ? `<span class="text-[10px] font-mono text-green-700 font-bold">📟 ${f.mapcode}</span>` : '';
                    const mapLink = f.mapUrl ? `<a href="${f.mapUrl}" target="_blank" class="text-indigo-600"><i class="fa-solid fa-map-location-dot"></i></a>` : '';
                    html += `
                        <div class="bg-orange-50/40 rounded-xl p-3 border border-orange-100/30 flex justify-between items-start gap-3">
                            <div>
                                <span class="bg-orange-100 text-orange-700 text-[8px] font-bold px-1.5 py-0.5 rounded-md">${f.meal || ''}</span>
                                <span class="text-xs font-bold text-slate-800 ml-1.5">${f.name}</span>
                                <p class="text-[10px] text-slate-500 mt-0.5">${f.detail || ''}</p>
                                ${mc}
                            </div>
                            ${mapLink}
                        </div>
                    `;
                });
                html += '</div></div>';
            }

            // Parking (drive mode only)
            if (isDrive && day.parking && day.parking.length > 0) {
                html += `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 text-xs mb-3 flex items-center gap-1.5">
                        <i class="fa-solid fa-square-parking text-blue-500"></i> 停車場
                    </h3>
                    <div class="space-y-3">
                `;
                day.parking.forEach(p => {
                    const mc = p.mapcode ? `<span class="text-[10px] font-mono text-green-700 font-bold">📟 ${p.mapcode}</span>` : '';
                    const mapLink = p.mapUrl ? `<a href="${p.mapUrl}" target="_blank" class="text-indigo-600"><i class="fa-solid fa-map-location-dot"></i></a>` : '';
                    html += `
                        <div class="bg-blue-50/40 rounded-xl p-3 border border-blue-100/30 flex justify-between items-start gap-3">
                            <div>
                                <span class="bg-blue-100 text-blue-700 text-[8px] font-bold px-1.5 py-0.5 rounded-md">🅿️ ${p.name}</span>
                                <p class="text-[10px] text-slate-500 mt-0.5">${p.detail || ''}</p>
                                ${mc}
                            </div>
                            ${mapLink}
                        </div>
                    `;
                });
                html += '</div></div>';
            }

            // Hotel
            if (day.hotel) {
                const mc = (day.hotel.mapcode && isDrive) ? `<span class="text-[10px] font-mono text-green-700 font-bold mt-1 block">📟 ${day.hotel.mapcode}</span>` : '';
                const mapLink = day.hotel.mapUrl ? `<a href="${day.hotel.mapUrl}" target="_blank" class="text-indigo-600"><i class="fa-solid fa-map-location-dot"></i></a>` : '';
                html += `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 text-xs mb-3 flex items-center gap-1.5">
                        <i class="fa-solid fa-hotel text-purple-500"></i> 住宿
                    </h3>
                    <div class="bg-purple-50/40 rounded-xl p-3 border border-purple-100/30 flex justify-between items-start gap-3">
                        <div>
                            <h4 class="text-xs font-bold text-slate-800">${day.hotel.name}</h4>
                            <p class="text-[10px] text-slate-500">${day.hotel.detail || ''}</p>
                            ${mc}
                        </div>
                        ${mapLink}
                    </div>
                </div>`;
            }

            // Details
            if (day.details) {
                html += `
                <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4 flex gap-3">
                    <i class="fa-solid fa-circle-exclamation text-amber-500 text-sm shrink-0 mt-0.5"></i>
                    <p class="text-[10px] text-slate-600 leading-relaxed">${day.details}</p>
                </div>`;
            }

            return html;
        }

        function renderChecklist(data, state) {
            const el = document.getElementById('checklist');
            if (!el) return;
            el.innerHTML = '';
            (data.sightsList || []).forEach(sight => {
                const checked = state.completedSights[sight.id] ? 'checked' : '';
                el.innerHTML += `
                    <div class="flex items-center justify-between p-1.5 hover:bg-slate-50 rounded-lg">
                        <label class="flex items-center gap-2 cursor-pointer w-full">
                            <input type="checkbox" onchange="toggleSight('${sight.id}')" ${checked} class="rounded text-indigo-600 h-4 w-4">
                            <span class="text-xs font-medium ${checked ? 'line-through text-slate-400' : 'text-slate-700'}">${sight.name}</span>
                        </label>
                    </div>
                `;
            });
        }

        function renderPreTripChecklist(state) {
            if (!state.preTripChecked) state.preTripChecked = {};
            const ids = ['passport','license','money','luggage','phone','itinerary','vjw','medicine'];
            ids.forEach(id => {
                const cb = document.querySelector(`#pretrip-checklist input[onchange*="${id}"]`);
                if (cb) cb.checked = !!state.preTripChecked[id];
            });
        }

        function renderExpenses(data, state) {
            const listEl = document.getElementById('expense-list');
            if (!listEl) return;
            listEl.innerHTML = '';
            let total = 0;
            state.expenses.forEach(item => {
                total += item.amount;
                listEl.innerHTML += `
                    <div class="flex justify-between items-center py-2 text-xs">
                        <span class="text-slate-700">${item.name}</span>
                        <div class="flex items-center gap-2.5">
                            <span class="font-bold text-slate-800">${item.amount.toLocaleString()} JPY</span>
                            <button onclick="deleteExpense(${item.id})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
            });
            if (state.expenses.length === 0) listEl.innerHTML = '<p class="text-slate-400 text-center py-4">沒有花費記錄</p>';
            const rate = data.jpyToTwdRate || 0.22;
            document.getElementById('total-jpy').textContent = `${total.toLocaleString()} JPY`;
            document.getElementById('total-twd').textContent = `NT$ ${Math.round(total * rate).toLocaleString()}`;
        }

        function updateNotePlaceholder(data, state) {
            const el = document.getElementById('quick-note');
            if (!el) return;
            const tab = state.activeTab;
            el.placeholder = tab === 'tools' ? '備忘記事...' : `${data.days[tab]?.label || tab} 筆記...`;
            el.value = state.quickNotes[tab] || '';
        }

        function startCountdown(target) {
            const t = new Date(target).getTime();
            function update() {
                const diff = t - Date.now();
                if (diff <= 0) { document.getElementById('countdown').innerHTML = '🎉 旅途愉快！'; return; }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('countdown').innerHTML = `<i class="fa-solid fa-hourglass-half text-amber-500 mr-1"></i> 剩 ${d} 天 ${h} 小時`;
            }
            update();
            setInterval(update, 60000);
        }
    </script>
</body>
</html>
